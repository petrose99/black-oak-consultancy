backend:
  name: github
  repo: petrose99/black-oak-consultancy
  branch: master
  auth_type: pkce
  app_id: Ov23liOEnHQPfONtFBWS

site_url: https://black-oak-consultancy.blackoak.workers.dev
display_url: https://black-oak-consultancy.blackoak.workers.dev
logo_url: /assets/logo-dark-full.png

slug:
  encoding: "ascii"
  clean_accents: true

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "content/settings.json"
        format: "json"
        fields:
          - { name: "title", label: "Site Title", widget: "string" }
          - { name: "tagline", label: "Tagline", widget: "string" }
          - { name: "description", label: "Meta Description", widget: "text" }
          - { name: "philosophy", label: "Philosophy Quote", widget: "string" }
          - name: "social"
            label: "Social Links"
            widget: "object"
            fields:
              - { name: "instagram", label: "Instagram URL", widget: "string", required: false }
              - { name: "facebook", label: "Facebook URL", widget: "string", required: false }
              - { name: "linkedin", label: "LinkedIn URL", widget: "string", required: false }

  - name: "hero"
    label: "Hero Section"
    files:
      - name: "hero"
        label: "Hero Content"
        file: "content/hero.json"
        format: "json"
        fields:
          - { name: "eyebrow", label: "Eyebrow Text", widget: "string" }
          - { name: "headline_line1", label: "Headline Line 1", widget: "string" }
          - { name: "headline_line2", label: "Headline Highlighted Word", widget: "string", hint: "This word appears in gold italic" }
          - { name: "headline_line2_suffix", label: "Headline After Highlight", widget: "string" }
          - { name: "subtext", label: "Sub-headline", widget: "text" }
          - { name: "cta_primary", label: "Primary Button Text", widget: "string" }
          - { name: "cta_secondary", label: "Secondary Button Text", widget: "string" }
          - name: "stats"
            label: "Statistics"
            widget: "list"
            max: 4
            fields:
              - { name: "number", label: "Number", widget: "string" }
              - { name: "label", label: "Label", widget: "string" }

  - name: "about"
    label: "About Section"
    files:
      - name: "about"
        label: "About Content"
        file: "content/about.json"
        format: "json"
        fields:
          - { name: "heading", label: "Heading", widget: "string" }
          - name: "paragraphs"
            label: "Body Paragraphs"
            widget: "list"
            field: { name: "paragraph", label: "Paragraph", widget: "text" }
          - { name: "philosophy_quote", label: "Philosophy Quote", widget: "string" }
          - name: "industries"
            label: "Industry Tags"
            widget: "list"
            field: { name: "industry", label: "Industry", widget: "string" }
          - name: "stats"
            label: "Statistics"
            widget: "list"
            max: 4
            fields:
              - { name: "number", label: "Number", widget: "string" }
              - { name: "suffix", label: "Suffix", widget: "string", hint: "e.g. +, h, ." }
              - { name: "label", label: "Label", widget: "string" }

  - name: "why-us"
    label: "Why Us Section"
    files:
      - name: "why-us"
        label: "Why Us Content"
        file: "content/why-us.json"
        format: "json"
        fields:
          - { name: "heading", label: "Section Heading", widget: "string" }
          - name: "items"
            label: "Advantage Cards"
            widget: "list"
            fields:
              - { name: "numeral", label: "Numeral", widget: "string", hint: "e.g. i., ii., iii." }
              - { name: "title", label: "Title", widget: "string" }
              - { name: "text", label: "Description", widget: "text" }

  - name: "services"
    label: "Practice Areas"
    files:
      - name: "services"
        label: "All Practice Areas"
        file: "content/services.json"
        format: "json"
        fields:
          - { name: "heading", label: "Section Heading", widget: "text" }
          - { name: "intro", label: "Section Intro", widget: "text" }
          - name: "areas"
            label: "Practice Areas"
            widget: "list"
            fields:
              - { name: "id", label: "ID (e.g. p1)", widget: "string" }
              - { name: "number", label: "Number (e.g. 01)", widget: "string" }
              - { name: "name", label: "Area Name", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }
              - { name: "cta", label: "CTA Text", widget: "string" }
              - name: "values"
                label: "Value Propositions"
                widget: "list"
                max: 3
                fields:
                  - { name: "title", label: "Title", widget: "string" }
                  - { name: "text", label: "Text", widget: "text" }
                  - { name: "icon", label: "Icon", widget: "select", options: ["check", "clock", "dollar", "shield", "chart", "star", "bars"] }
              - name: "groups"
                label: "Service Groups"
                widget: "list"
                fields:
                  - { name: "title", label: "Group Title", widget: "string" }
                  - name: "items"
                    label: "Services"
                    widget: "list"
                    field: { name: "service", label: "Service", widget: "string" }

  - name: "pricing"
    label: "Pricing"
    files:
      - name: "pricing"
        label: "Pricing Content"
        file: "content/pricing.json"
        format: "json"
        fields:
          - { name: "heading", label: "Section Heading", widget: "string" }
          - { name: "intro", label: "Section Intro", widget: "text" }
          - name: "tiers"
            label: "Pricing Tiers"
            widget: "list"
            max: 4
            fields:
              - { name: "name", label: "Tier Name", widget: "string" }
              - { name: "audience", label: "Target Audience", widget: "string" }
              - { name: "price", label: "Price", widget: "string" }
              - { name: "per", label: "Per Period", widget: "string", required: false, hint: "e.g. / month" }
              - { name: "featured", label: "Featured?", widget: "boolean", default: false }
              - name: "features"
                label: "Features"
                widget: "list"
                field: { name: "feature", label: "Feature", widget: "string" }
              - { name: "cta", label: "Button Text", widget: "string" }
          - name: "alacarte"
            label: "À La Carte Services"
            widget: "list"
            fields:
              - { name: "service", label: "Service Name", widget: "string" }
              - { name: "price", label: "Price", widget: "string" }
              - { name: "note", label: "Note", widget: "string", required: false, hint: "e.g. per class, per document" }
          - { name: "alacarte_note", label: "Pricing Footnote", widget: "text" }

  - name: "testimonials"
    label: "Testimonials"
    files:
      - name: "testimonials"
        label: "Testimonial Quotes"
        file: "content/testimonials.json"
        format: "json"
        fields:
          - { name: "heading", label: "Section Heading", widget: "string" }
          - name: "quotes"
            label: "Quotes"
            widget: "list"
            fields:
              - { name: "text", label: "Quote Text", widget: "text" }
              - { name: "initial", label: "Initial Letter", widget: "string", hint: "Single letter for the avatar" }
              - { name: "company", label: "Company / Client Name", widget: "string" }
              - { name: "sector", label: "Sector", widget: "string" }

  - name: "clients"
    label: "Clients"
    files:
      - name: "clients"
        label: "Client List"
        file: "content/clients.json"
        format: "json"
        fields:
          - { name: "heading", label: "Section Heading", widget: "string" }
          - { name: "intro", label: "Section Intro", widget: "text" }
          - name: "list"
            label: "Clients"
            widget: "list"
            fields:
              - { name: "icon", label: "Material Icon Name", widget: "string", hint: "e.g. corporate_fare, gavel, domain — see fonts.google.com/icons" }
              - { name: "sector", label: "Sector", widget: "string" }
              - { name: "name", label: "Client Name", widget: "string" }
              - { name: "tag", label: "Relationship Tag", widget: "string" }

  - name: "contact"
    label: "Contact Info"
    files:
      - name: "contact"
        label: "Contact Details"
        file: "content/contact.json"
        format: "json"
        fields:
          - { name: "heading", label: "Section Heading", widget: "string" }
          - { name: "intro", label: "Intro Text", widget: "text" }
          - name: "assessment_items"
            label: "Assessment Checklist"
            widget: "list"
            field: { name: "item", label: "Item", widget: "string" }
          - { name: "whatsapp", label: "WhatsApp Number (display)", widget: "string" }
          - { name: "whatsapp_link", label: "WhatsApp Link (wa.me/...)", widget: "string" }
          - { name: "phone_primary", label: "Primary Phone", widget: "string" }
          - { name: "phone_secondary", label: "Secondary Phone", widget: "string" }
          - { name: "email_primary", label: "Primary Email", widget: "string" }
          - { name: "email_secondary", label: "Secondary Email", widget: "string" }
          - { name: "address", label: "Office Address", widget: "string" }
          - { name: "maps_link", label: "Google Maps Link", widget: "string" }
          - { name: "hours", label: "Business Hours", widget: "string" }
